<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bandeira do Brasil Simples</title>
    <style>
        /* Retângulo Verde */
        .verde {
            width: 300px;
            height: 210px;
            background-color: #009c3b;
            position: relative;
        }

        /* Losango Amarelo */
        .amarelo {
            width: 150px;
            height: 150px;
            background-color: #ffdf00;
            transform: rotate(45deg);
            position: absolute;
            top: 30px;
            left: 75px;
        }

        /* Círculo Azul */
        .azul {
            width: 90px;
            height: 90px;
            background-color: #002776;
            border-radius: 50%;
            position: absolute;
            top: 60px;
            left: 105px;
        }
    </style>
</head>
<body>

    <div class="verde">
        <div class="amarelo"></div>
        <div class="azul"></div>
    </div>

</body>
</html>
